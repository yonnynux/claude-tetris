<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section theme-toggle-section">
          <span class="label">THEME</span>
          <label class="theme-toggle">
            <input type="checkbox" id="theme-toggle" />
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
            <span class="toggle-label">Light</span>
          </label>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <!-- Game Over state -->
      <div id="gameover-box" class="overlay-box hidden">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>

      <!-- Pause menu state -->
      <div id="pause-box" class="overlay-box hidden">
        <p class="pause-title">PAUSA</p>

        <div id="pause-main">
          <button id="resume-btn" class="menu-btn">Reanudar</button>
          <button id="pause-restart-btn" class="menu-btn">Reiniciar</button>
          <button id="controls-btn" class="menu-btn menu-btn--secondary">Ver controles</button>

          <div class="level-selector">
            <span class="level-selector__label">Nivel inicial</span>
            <div class="level-selector__controls">
              <button id="level-dec-btn" class="level-btn">−</button>
              <span id="start-level-display">1</span>
              <button id="level-inc-btn" class="level-btn">+</button>
            </div>
          </div>
        </div>

        <div id="controls-view" class="controls-view hidden">
          <button id="controls-back-btn" class="menu-btn menu-btn--secondary">← Volver</button>
          <ul class="controls-list">
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar lento</li>
            <li><kbd>Space</kbd> caída dura</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
