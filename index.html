<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="panel-section">
          <span class="label">COMBO</span>
          <span class="value" id="combo">0</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section theme-toggle-section">
          <span class="label">THEME</span>
          <label class="theme-toggle">
            <input type="checkbox" id="theme-toggle" />
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
            <span class="toggle-label">Light</span>
          </label>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <!-- Start screen overlay (shown before first game) -->
    <div id="start-overlay" class="overlay">
      <div class="overlay-box">
        <p class="overlay-main-title">TETRIS</p>
        <div class="records-section">
          <p class="records-heading">TOP 5</p>
          <table class="records-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Score</th>
                <th>Líneas</th>
                <th>Combo</th>
              </tr>
            </thead>
            <tbody id="start-records-body"></tbody>
          </table>
        </div>
        <button id="play-btn">¡Jugar!</button>
        <button id="reset-records-btn" class="btn-secondary">Resetear records</button>
      </div>
    </div>

    <!-- Game overlay (pause / game over) -->
    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <!-- Save record section (shown only when score qualifies) -->
        <div id="save-record-section" class="save-record-section hidden">
          <p class="save-record-label">¡Nueva entrada en el top 5!</p>
          <input type="text" id="player-name-input" class="player-name-input" maxlength="16" placeholder="Tu nombre" />
          <button id="save-record-btn">Guardar</button>
        </div>

        <!-- Top 5 table shown on game over -->
        <div id="gameover-records-section" class="records-section hidden">
          <p class="records-heading">TOP 5</p>
          <table class="records-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Score</th>
                <th>Líneas</th>
                <th>Combo</th>
              </tr>
            </thead>
            <tbody id="gameover-records-body"></tbody>
          </table>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
